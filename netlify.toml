# Netlify configuration for ComplaintIQ (React/Vite SPA)
[build]
  command = "npm run build"
  publish = "dist"

# Single Page Application (SPA) redirects
# Redirects all navigation requests to index.html for React Router to handle
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Optional: Add security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://clerk.com https://*.clerk.accounts.dev; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.clerk.accounts.dev https://*.onrender.com https://*.clerk.com; img-src 'self' data: https://clerk.com https://img.clerk.com;"
