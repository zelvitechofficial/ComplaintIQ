services:
  # ── Backend Service (Flask) ────────────────────────────────────────────────
  - type: web
    name: complaint-analysis-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.10.12 # or your preferred version
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false # Set this in Render Dashboard (Neon PostgreSQL)
      - key: CLERK_SECRET_KEY
        sync: false # Set this in Render Dashboard
      - key: PRODUCTION_FRONTEND_URL
        sync: false # Set this in Render Dashboard to your Netlify URL
